<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pop the Balloons</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  overflow: hidden;
  touch-action: manipulation;
  font-family: -apple-system, system-ui, sans-serif;
  height: 100vh;
  width: 100vw;
  position: relative;
}

#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  z-index: 100;
  backdrop-filter: blur(8px);
}

#hud .score { color: #ffd700; }
#hud .combo { color: #ff6b6b; font-size: 14px; }
#hud .missed { color: #aaa; font-size: 14px; }

#game-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}

.balloon {
  position: absolute;
  width: 60px;
  height: 76px;
  cursor: pointer;
  transition: none;
  will-change: transform;
  user-select: none;
  -webkit-user-select: none;
  z-index: 10;
}

.balloon-body {
  width: 60px;
  height: 60px;
  border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
  position: relative;
  box-shadow: inset -8px -4px 12px rgba(0,0,0,0.2), inset 8px 8px 12px rgba(255,255,255,0.15);
}

.balloon-body::after {
  content: '';
  position: absolute;
  top: 12px;
  left: 14px;
  width: 14px;
  height: 10px;
  background: rgba(255,255,255,0.35);
  border-radius: 50%;
  transform: rotate(-30deg);
}

.balloon-knot {
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  margin: 0 auto;
}

.balloon-string {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.3);
  margin: 0 auto;
}

/* Balloon colors */
.balloon.red .balloon-body { background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b); }
.balloon.red .balloon-knot { border-top: 8px solid #c0392b; }

.balloon.blue .balloon-body { background: radial-gradient(circle at 35% 35%, #74b9ff, #2980b9); }
.balloon.blue .balloon-knot { border-top: 8px solid #2980b9; }

.balloon.green .balloon-body { background: radial-gradient(circle at 35% 35%, #55efc4, #00b894); }
.balloon.green .balloon-knot { border-top: 8px solid #00b894; }

.balloon.yellow .balloon-body { background: radial-gradient(circle at 35% 35%, #ffeaa7, #fdcb6e); }
.balloon.yellow .balloon-knot { border-top: 8px solid #fdcb6e; }

.balloon.purple .balloon-body { background: radial-gradient(circle at 35% 35%, #a29bfe, #6c5ce7); }
.balloon.purple .balloon-knot { border-top: 8px solid #6c5ce7; }

.balloon.pink .balloon-body { background: radial-gradient(circle at 35% 35%, #fd79a8, #e84393); }
.balloon.pink .balloon-knot { border-top: 8px solid #e84393; }

/* Golden balloon = bonus */
.balloon.gold .balloon-body {
  background: radial-gradient(circle at 35% 35%, #fff9c4, #ffd700, #ff8f00);
  box-shadow: inset -8px -4px 12px rgba(0,0,0,0.2), inset 8px 8px 12px rgba(255,255,255,0.3), 0 0 20px rgba(255,215,0,0.4);
}
.balloon.gold .balloon-knot { border-top: 8px solid #ff8f00; }

.pop-effect {
  position: absolute;
  pointer-events: none;
  z-index: 50;
  animation: pop 0.4s ease-out forwards;
}

.pop-particle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: particle 0.5s ease-out forwards;
}

@keyframes pop {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(2.5); opacity: 0; }
}

@keyframes particle {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { opacity: 0; }
}

.score-popup {
  position: absolute;
  color: #ffd700;
  font-size: 24px;
  font-weight: 900;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  pointer-events: none;
  z-index: 60;
  animation: scoreFloat 0.8s ease-out forwards;
}

@keyframes scoreFloat {
  0% { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
}

#status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 8px 16px;
  background: rgba(0,0,0,0.6);
  color: #888;
  font-size: 11px;
  font-family: monospace;
  z-index: 100;
  backdrop-filter: blur(8px);
}

#status-bar .bot-label {
  color: #ffd700;
  font-weight: bold;
}
</style>
</head>
<body>

<div id="hud">
  <div>
    <span class="score" id="score">Score: 0</span>
    <span class="combo" id="combo"></span>
  </div>
  <div>
    <span class="missed" id="missed">Missed: 0</span>
  </div>
</div>

<div id="game-area"></div>

<div id="status-bar">
  <span class="bot-label">BOT:</span> <span id="bot-status">Waiting for commands...</span>
</div>

<script>
const COLORS = ['red', 'blue', 'green', 'yellow', 'purple', 'pink'];
const GOLD_CHANCE = 0.08;
const SPAWN_INTERVAL_MIN = 600;
const SPAWN_INTERVAL_MAX = 1400;
const FLOAT_SPEED_MIN = 1.2;
const FLOAT_SPEED_MAX = 2.8;

let score = 0;
let missed = 0;
let combo = 0;
let balloons = [];
let nextId = 0;
let gameWidth, gameHeight;

const gameArea = document.getElementById('game-area');
const scoreEl = document.getElementById('score');
const missedEl = document.getElementById('missed');
const comboEl = document.getElementById('combo');
const botStatus = document.getElementById('bot-status');

function updateSize() {
  gameWidth = window.innerWidth;
  gameHeight = window.innerHeight;
}
updateSize();
window.addEventListener('resize', updateSize);

function createBalloon() {
  const id = nextId++;
  const isGold = Math.random() < GOLD_CHANCE;
  const color = isGold ? 'gold' : COLORS[Math.floor(Math.random() * COLORS.length)];
  const x = 30 + Math.random() * (gameWidth - 90);
  const speed = FLOAT_SPEED_MIN + Math.random() * (FLOAT_SPEED_MAX - FLOAT_SPEED_MIN);
  const wobble = 0.3 + Math.random() * 0.7;
  const wobbleSpeed = 0.02 + Math.random() * 0.03;

  const el = document.createElement('div');
  el.className = `balloon ${color}`;
  el.dataset.id = id;
  el.innerHTML = `
    <div class="balloon-body"></div>
    <div class="balloon-knot"></div>
    <div class="balloon-string"></div>
  `;

  const startY = gameHeight + 20;
  el.style.left = x + 'px';
  el.style.top = startY + 'px';

  gameArea.appendChild(el);

  const balloon = { id, el, x, y: startY, speed, color, isGold, wobble, wobbleSpeed, phase: Math.random() * Math.PI * 2, alive: true };
  balloons.push(balloon);

  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    popBalloon(balloon);
  }, { passive: false });

  // Expose position for the Android bridge
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    popBalloon(balloon);
  }, { passive: false });
}

function popBalloon(balloon) {
  if (!balloon.alive) return;
  balloon.alive = false;

  combo++;
  const points = balloon.isGold ? 50 : (combo >= 5 ? 3 : combo >= 3 ? 2 : 1);
  score += points;

  scoreEl.textContent = `Score: ${score}`;
  comboEl.textContent = combo >= 3 ? `${combo}x Combo!` : '';

  // Pop effect
  const rect = balloon.el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  showPopEffect(cx, cy, balloon.color);
  showScorePopup(cx, cy, `+${points}`);

  balloon.el.remove();
  balloons = balloons.filter(b => b.id !== balloon.id);

  // Notify Android
  if (window.GameBridge) {
    window.GameBridge.onBalloonPopped(balloon.id, score, cx, cy);
  }
}

function showPopEffect(x, y, color) {
  const container = document.createElement('div');
  container.className = 'pop-effect';
  container.style.left = x + 'px';
  container.style.top = y + 'px';

  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'pop-particle';
    const angle = (Math.PI * 2 * i) / 8;
    const dist = 30 + Math.random() * 30;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.background = color === 'gold' ? '#ffd700' : '';
    p.style.animation = `particle 0.5s ease-out forwards`;
    p.style.transform = `translate(${dx}px, ${dy}px)`;
    container.appendChild(p);
  }

  document.body.appendChild(container);
  setTimeout(() => container.remove(), 600);
}

function showScorePopup(x, y, text) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function animate() {
  for (let i = balloons.length - 1; i >= 0; i--) {
    const b = balloons[i];
    if (!b.alive) continue;

    b.y -= b.speed;
    b.phase += b.wobbleSpeed;
    const wobbleX = Math.sin(b.phase) * b.wobble * 20;

    b.el.style.top = b.y + 'px';
    b.el.style.transform = `translateX(${wobbleX}px)`;

    // Off screen
    if (b.y < -100) {
      b.el.remove();
      balloons.splice(i, 1);
      if (!b.isGold) {
        missed++;
        combo = 0;
        missedEl.textContent = `Missed: ${missed}`;
        comboEl.textContent = '';
      }
    }
  }
  requestAnimationFrame(animate);
}

function spawnLoop() {
  createBalloon();
  const next = SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
  setTimeout(spawnLoop, next);
}

// === Android Bridge API ===
// These functions are called by the Android demo to query balloon positions

window.getActiveBalloons = function() {
  return balloons.filter(b => b.alive).map(b => {
    const rect = b.el.getBoundingClientRect();
    return {
      id: b.id,
      color: b.color,
      isGold: b.isGold,
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2,
      width: rect.width,
      height: rect.height
    };
  });
};

window.getScore = function() {
  return { score, missed, combo };
};

window.setBotStatus = function(msg) {
  botStatus.textContent = msg;
};

// Start
requestAnimationFrame(animate);
setTimeout(spawnLoop, 500);
</script>
</body>
</html>
