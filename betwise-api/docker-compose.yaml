name: betwise

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bw-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - betwise
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: bw-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - betwise
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bw-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --no-interaction
    volumes:
      - .:/var/www/html
    networks:
      - betwise
    depends_on:
      - db
      - redis

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bw-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    volumes:
      - .:/var/www/html
    ports:
      - "8081:8080"
    networks:
      - betwise
    depends_on:
      - db
      - redis

  adminer:
    image: adminer:latest
    container_name: bw-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - betwise
    depends_on:
      - db

  redis:
    image: redis:alpine
    container_name: bw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - betwise

  db:
    image: mariadb:11
    container_name: bw-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-betwise_api}
      MARIADB_USER: ${DB_USERNAME:-betwise}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - betwise

networks:
  betwise:
    driver: bridge

volumes:
  dbdata:
    driver: local
